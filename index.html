<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwasthyaSetu AI | Demo</title>

<!-- Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
/* ===== ROOT ===== */
:root {
  --primary: #2563eb;
  --teal: #0d9488;
  --green: #22c55e;
  --red: #ef4444;

  --bg: #f4f7fb;
  --card: #ffffff;
  --sidebar: #0f172a;

  --text: #0f172a;
  --subtext: #64748b;
  --border: #e2e8f0;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: var(--bg);
}

/* ===== LAYOUT ===== */
.app {
  display: flex;
  height: 100vh;
}

/* ===== SIDEBAR ===== */
aside {
  width: 250px;
  background: var(--sidebar);
  color: white;
  display: flex;
  flex-direction: column;
}

.logo {
  padding: 20px;
  font-weight: bold;
  font-size: 20px;
}

.nav a {
  display: flex;
  gap: 10px;
  padding: 14px 20px;
  color: #cbd5e1;
  text-decoration: none;
}

.nav a:hover, .active {
  background: rgba(37,99,235,0.2);
  color: white;
}

/* ===== MAIN ===== */
main {
  flex: 1;
  padding: 20px;
}

/* ===== HEADER ===== */
header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
}

/* ===== CARDS ===== */
.cards {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 12px;
  flex: 1;
}

.card h2 {
  font-size: 28px;
}

/* ===== BUTTON ===== */
button {
  padding: 10px;
  border: none;
  background: var(--primary);
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* ===== SECTIONS ===== */
.section {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 10px;
  font-size: 12px;
  color: var(--subtext);
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside>
  <div class="logo">SwasthyaSetu</div>
  <div class="nav">
    <a href="#" class="active">Dashboard</a>
    <a href="#">Upload</a>
    <a href="#">Reports</a>
    <a href="#">Clinical Audit</a>
    <a href="#">Data Lab</a>
  </div>
</aside>

<!-- MAIN -->
<main>

<header>
  <input type="text" id="search" placeholder="Search..." oninput="showSuggestions()">
  <div id="suggestions"></div>
</header>

<!-- DASHBOARD -->
<div class="cards">
  <div class="card">
    <p>Health Score</p>
    <h2 id="score">85%</h2>
  </div>
  <div class="card">
    <p>Reports</p>
    <h2 id="reports">0</h2>
  </div>
</div>

<!-- UPLOAD -->
<div class="section">
  <h3>Upload Report</h3>
  <input type="file" id="file">
  <button onclick="upload()">Upload</button>
  <p id="uploadStatus"></p>
</div>

<!-- REPORTS -->
<div class="section">
  <h3>My Reports</h3>
  <ul id="reportList"></ul>
</div>

<!-- AI ANALYSIS -->
<div class="section">
  <h3>AI Summary</h3>
  <p id="summary">Upload a file to see analysis...</p>
</div>

<!-- DATA LAB -->
<div class="section">
  <h3>Data Lab</h3>
  <input id="topic" placeholder="Topic">
  <input id="desc" placeholder="Description">
  <input id="link" placeholder="Link">
  <button onclick="addDataset()">Add Dataset</button>
  <ul id="datasets"></ul>
</div>

<footer>
  © 2026 SwasthyaSetu AI • Demo Version
</footer>

</main>
</div>

<script>
lucide.createIcons();

/* ===== UPLOAD SIMULATION ===== */
function upload() {
  let file = document.getElementById("file").files[0];
  if (!file) return alert("Select file");

  document.getElementById("uploadStatus").innerText = "Analyzing...";
  
  setTimeout(() => {
    let reports = JSON.parse(localStorage.getItem("reports")) || [];
    reports.push(file.name);
    localStorage.setItem("reports", JSON.stringify(reports));

    document.getElementById("uploadStatus").innerText = "Upload Complete";
    document.getElementById("summary").innerText =
      "This document appears to be a medical report showing normal vitals with minor observations.";

    loadReports();
  }, 1500);
}

/* ===== LOAD REPORTS ===== */
function loadReports() {
  let list = document.getElementById("reportList");
  list.innerHTML = "";

  let reports = JSON.parse(localStorage.getItem("reports")) || [];
  document.getElementById("reports").innerText = reports.length;

  reports.forEach(r => {
    let li = document.createElement("li");
    li.innerHTML = r + " <button onclick='download(\""+r+"\")'>Download</button>";
    list.appendChild(li);
  });
}

/* ===== DOWNLOAD ===== */
function download(name) {
  let blob = new Blob(["Demo PDF content"], { type: "application/pdf" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

/* ===== SEARCH SUGGESTIONS ===== */
let suggestions = ["Diabetes", "Heart Report", "Blood Test", "MRI Scan"];

function showSuggestions() {
  let input = document.getElementById("search").value.toLowerCase();
  let box = document.getElementById("suggestions");
  box.innerHTML = "";

  suggestions
    .filter(s => s.toLowerCase().includes(input))
    .forEach(s => {
      let div = document.createElement("div");
      div.innerText = s;
      box.appendChild(div);
    });
}

/* ===== DATA LAB ===== */
function addDataset() {
  let topic = document.getElementById("topic").value;
  let desc = document.getElementById("desc").value;
  let link = document.getElementById("link").value;

  let data = JSON.parse(localStorage.getItem("datasets")) || [];
  data.push({ topic, desc, link });
  localStorage.setItem("datasets", JSON.stringify(data));

  loadDatasets();
}

function loadDatasets() {
  let list = document.getElementById("datasets");
  list.innerHTML = "";

  let data = JSON.parse(localStorage.getItem("datasets")) || [];

  data.forEach(d => {
    let li = document.createElement("li");
    li.innerHTML = `<b>${d.topic}</b> - ${d.desc} 
    <button onclick="window.open('${d.link}')">Open</button>`;
    list.appendChild(li);
  });
}

/* ===== INIT ===== */
loadReports();
loadDatasets();
</script>

</body>
</html>
